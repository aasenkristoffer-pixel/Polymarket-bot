<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Polymarket CopyTrade</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07070b;color:#d0d0e8;font-family:'JetBrains Mono',monospace;min-height:100vh}
button{cursor:pointer;font-family:'JetBrains Mono',monospace;border:none;border-radius:6px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 8px #f0c04040}50%{box-shadow:0 0 20px #f0c04090}}
.blink{animation:pulse 1s infinite}
.fade{animation:fadeIn 0.3s ease}
</style>
</head>
<body>
<div id="main">
  <div style="background:#0a0a10;border-bottom:1px solid #1a1a28;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#f0c040,#ffab00);display:flex;align-items:center;justify-content:center;font-size:14px;animation:glow 2s infinite">⚡</div>
      <div>
        <div style="font-size:12px;font-weight:700;color:#f0c040">COPYTRADE BOT</div>
        <div style="font-size:8px;color:#3a3a5a" id="statusLine">CONNECTING...</div>
      </div>
    </div>
    <span id="modeBadge" style="font-size:8px;padding:3px 8px;border-radius:4px;background:#f0c04020;color:#f0c040;letter-spacing:1px">DRY RUN</span>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:#1a1a28;border-bottom:1px solid #1a1a28">
    <div style="background:#0a0a10;padding:12px;text-align:center">
      <div style="font-size:8px;color:#3a3a5a;letter-spacing:1.5px">TRADES</div>
      <div style="font-size:20px;font-weight:700;color:#f0c040" id="statTrades">0</div>
    </div>
    <div style="background:#0a0a10;padding:12px;text-align:center">
      <div style="font-size:8px;color:#3a3a5a;letter-spacing:1.5px">AVG CONF</div>
      <div style="font-size:20px;font-weight:700;color:#00e5ff" id="statConf">-</div>
    </div>
    <div style="background:#0a0a10;padding:12px;text-align:center">
      <div style="font-size:8px;color:#3a3a5a;letter-spacing:1.5px">WALLETS</div>
      <div style="font-size:20px;font-weight:700;color:#00ff88" id="statWallets">0</div>
    </div>
  </div>
  <div style="display:flex;background:#0a0a10;border-bottom:1px solid #1a1a28">
    <button onclick="showTab('wallets')" id="tab-wallets" style="flex:1;padding:11px;background:#f0c04015;color:#f0c040;border-bottom:2px solid #f0c040;font-size:10px;letter-spacing:1px;border-radius:0">WALLETS</button>
    <button onclick="showTab('signal')" id="tab-signal" style="flex:1;padding:11px;background:transparent;color:#3a3a5a;border-bottom:2px solid transparent;font-size:10px;letter-spacing:1px;border-radius:0">SIGNAL</button>
    <button onclick="showTab('history')" id="tab-history" style="flex:1;padding:11px;background:transparent;color:#3a3a5a;border-bottom:2px solid transparent;font-size:10px;letter-spacing:1px;border-radius:0">HISTORY</button>
  </div>
  <div id="tab-wallets-content">
    <div style="padding:12px 16px;display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:9px;color:#3a3a5a;letter-spacing:2px">TOP WALLETS - TAP TO ANALYZE</div>
      <button onclick="loadWallets()" style="background:#f0c04020;color:#f0c040;border:1px solid #f0c04040;font-size:9px;padding:5px 12px;letter-spacing:1px">SCAN</button>
    </div>
    <div id="walletList"></div>
  </div>
  <div id="tab-signal-content" style="display:none;padding:16px">
    <div id="signalContent"><div style="text-align:center;padding:60px 20px;color:#3a3a5a;font-size:11px;line-height:2">Select a wallet from the Wallets tab to generate an AI trade signal</div></div>
  </div>
  <div id="tab-history-content" style="display:none">
    <div style="padding:12px 16px;font-size:9px;color:#3a3a5a;letter-spacing:2px">EXECUTED TRADES</div>
    <div id="historyList"></div>
  </div>
</div>
