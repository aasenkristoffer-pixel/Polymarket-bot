<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Polymarket CopyTrade</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#07070b;color:#d0d0e8;font-family:'JetBrains Mono',monospace;min-height:100vh}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#1e1e2e}
input{background:#0f0f18;border:1px solid #2a2a3a;color:#00e5ff;border-radius:6px;padding:8px 12px;font-family:'JetBrains Mono',monospace;font-size:12px;width:100%}
button{cursor:pointer;font-family:'JetBrains Mono',monospace;border:none;border-radius:6px;transition:all 0.15s}
.screen{display:none}
.screen.active{display:block}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 8px #f0c04040}50%{box-shadow:0 0 20px #f0c04090}}
.blink{animation:pulse 1s infinite}
.fade{animation:fadeIn 0.3s ease}
</style>
</head>
<body>
<div id="setup" class="screen active">
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px">
    <div style="font-size:40px;margin-bottom:16px;filter:drop-shadow(0 0 16px #f0c040)">⚡</div>
    <div style="font-size:18px;font-weight:700;color:#f0c040;letter-spacing:1px;margin-bottom:6px">POLYMARKET COPYTRADE</div>
    <div style="font-size:10px;color:#3a3a5a;letter-spacing:3px;margin-bottom:32px">CONNECT TO YOUR BOT SERVER</div>
    <div style="width:100%;max-width:400px;display:flex;flex-direction:column;gap:12px">
      <div>
        <div style="font-size:9px;color:#3a3a5a;letter-spacing:2px;margin-bottom:6px">SERVER URL</div>
        <input id="serverUrl" value="https://polymarket-bot-production-0f9f.up.railway.app" placeholder="https://your-bot.up.railway.app" />
      </div>
      <div>
        <div style="font-size:9px;color:#3a3a5a;letter-spacing:2px;margin-bottom:6px">SERVER SECRET</div>
        <input id="serverSecret" type="password" value="polybot123" placeholder="polybot123" />
      </div>
      <div>
        <div style="font-size:9px;color:#3a3a5a;letter-spacing:2px;margin-bottom:6px">MIN WIN RATE (%)</div>
        <input id="minWr" type="number" value="88" min="80" max="99" />
      </div>
      <div>
        <div style="font-size:9px;color:#3a3a5a;letter-spacing:2px;margin-bottom:6px">MAX TRADE SIZE (USD)</div>
        <input id="maxSize" type="number" value="5" min="1" max="50" />
      </div>
      <button onclick="connect()" id="connectBtn" style="padding:14px;background:linear-gradient(135deg,#f0c040,#ffab00);color:#07070b;font-size:13px;font-weight:700;letter-spacing:2px;margin-top:8px">CONNECT BOT</button>
      <div id="connectError" style="font-size:10px;color:#ff3355;text-align:center;display:none"></div>
    </div>
  </div>
</div>
<div id="main" class="screen">
  <div style="background:#0a0a10;border-bottom:1px solid #1a1a28;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#f0c040,#ffab00);display:flex;align-items:center;justify-content:center;font-size:14px;animation:glow 2s infinite">⚡</div>
      <div>
        <div style="font-size:12px;font-weight:700;color:#f0c040">COPYTRADE BOT</div>
        <div style="font-size:8px;color:#3a3a5a" id="statusLine">CONNECTING...</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <span id="modeBadge" style="font-size:8px;padding:3px 8px;border-radius:4px;background:#f0c04020;color:#f0c040;letter-spacing:1px">DRY RUN</span>
      <button onclick="showSetup()" style="background:#1a1a28;color:#3a3a5a;font-size:10px;padding:5px 10px">⚙</button>
    </div>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:#1a1a28;border-bottom:1px solid #1a1a28">
    <div style="background:#0a0a10;padding:12px;text-align:center">
      <div style="font-size:8px;color:#3a3a5a;letter-spacing:1.5px">TRADES</div>
      <div style="font-size:20px;font-weight:700;color:#f0c040" id="statTrades">0</div>
    </div>
    <div style="background:#0a0a10;padding:12px;text-align:center">
      <div style="font-size:8px;color:#3a3a5a;letter-spacing:1.5px">AVG CONF</div>
      <div style="font-size:20px;font-weight:700;color:#00e5ff" id="statConf">-</div>
    </div>
    <div style="background:#0a0a10;padding:12px;text-align:center">
      <div style="font-size:8px;color:#3a3a5a;letter-spacing:1.5px">WALLETS</div>
      <div style="font-size:20px;font-weight:700;color:#00ff88" id="statWallets">0</div>
    </div>
  </div>
  <div style="display:flex;background:#0a0a10;border-bottom:1px solid #1a1a28">
    <button onclick="showTab('wallets')" id="tab-wallets" style="flex:1;padding:11px;background:#f0c04015;color:#f0c040;border-bottom:2px solid #f0c040;font-size:10px;letter-spacing:1px;border-radius:0">WALLETS</button>
    <button onclick="showTab('signal')" id="tab-signal" style="flex:1;padding:11px;background:transparent;color:#3a3a5a;border-bottom:2px solid transparent;font-size:10px;letter-spacing:1px;border-radius:0">SIGNAL</button>
    <button onclick="showTab('history')" id="tab-history" style="flex:1;padding:11px;background:transparent;color:#3a3a5a;border-bottom:2px solid transparent;font-size:10px;letter-spacing:1px;border-radius:0">HISTORY</button>
  </div>
  <div id="tab-wallets-content">
    <div style="padding:12px 16px;display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:9px;color:#3a3a5a;letter-spacing:2px">TOP WALLETS - TAP TO ANALYZE</div>
      <button onclick="loadWallets()" style="background:#f0c04020;color:#f0c040;border:1px solid #f0c04040;font-size:9px;padding:5px 12px;letter-spacing:1px">SCAN</button>
    </div>
    <div id="walletList"></div>
  </div>
  <div id="tab-signal-content" style="display:none;padding:16px">
    <div id="signalContent">
      <div style="text-align:center;padding:60px 20px;color:#3a3a5a;font-size:11px;line-height:2">Select a wallet from the Wallets tab to generate an AI trade signal</div>
    </div>
  </div>
  <div id="tab-history-content" style="display:none">
    <div style="padding:12px 16px;font-size:9px;color:#3a3a5a;letter-spacing:2px">EXECUTED TRADES</div>
    <div id="historyList"></div>
  </div>
</div>
<script>
let SERVER="https://polymarket-bot-production-0f9f.up.railway.app";
let SECRET="polybot123";
let MIN_WR=0.88;
let MAX_SIZE=5;
let selectedWallet=null;
let selectedMarket=null;
let allTrades=[];
function seedWallets(count){
  const addrs=["0x4f2a","0x8c91","0x1d3e","0x7b44","0x2f9a","0x5e1c","0x9d3f","0xae72","0x3c85","0x6f1d","0xb203","0x0e94","0x7a5b","0xc341","0x4891","0x2d7f","0x9c2e","0x5f83","0x1b6a","0x8e05","0x3a9c","0x6d4e","0xd172","0x0b58","0x7e31"];
  return addrs.slice(0,count).map((a,i)=>{
    const wr=0.88+Math.random()*0.10;
    const total=40+Math.floor(Math.random()*180);
    return{addr:a+"...f"+((i+1).toString(16).padStart(3,"0")),winRate:wr,wins:Math.floor(total*wr),total,volume:5000+Math.random()*90000,pnl:(5000+Math.random()*90000)*(wr-0.5)*0.4,streak:Math.floor(Math.random()*12)+1,tags:wr>0.95?["ELITE"]:wr>0.92?["SHARP"]:["CONSISTENT"]};
  }).sort((a,b)=>b.winRate-a.winRate);
}
window.onload=()=>setTimeout(connect,500);
async function connect(){
  SERVER=document.getElementById("serverUrl").value.trim().replace(/\/$/,"");
  SECRET=document.getElementById("serverSecret").value.trim();
  MIN_WR=parseFloat(document.getElementById("minWr").value)/100;
  MAX_SIZE=parseFloat(document.getElementById("maxSize").value);
  const btn=document.getElementById("connectBtn");
  const err=document.getElementById("connectError");
  btn.textContent="CONNECTING...";
  btn.disabled=true;
  err.style.display="none";
  try{
    const r=await fetch(`${SERVER}/status`,{headers:{"x-secret":SECRET}});
    const d=await r.json();
    if(d.ok){
      updateStatus(d);
      document.getElementById("setup").classList.remove("active");
      document.getElementById("main").classList.add("active");
      loadWallets();
      loadHistory();
      setInterval(loadHistory,15000);
    }else{throw new Error("error");}
  }catch(e){
    err.textContent="Cannot connect. Check URL and secret.";
    err.style.display="block";
  }
  btn.textContent="CONNECT BOT";
  btn.disabled=false;
}

function showSetup(){
  document.getElementById("main").classList.remove("active");
  document.getElementById("setup").classList.add("active");
}

function updateStatus(d){
  document.getElementById("statusLine").textContent=d.has_creds?"CREDENTIALS LOADED":"NO CREDENTIALS";
  if(!d.dry_run){
    const b=document.getElementById("modeBadge");
    b.textContent="LIVE";
    b.style.background="#ff335520";
    b.style.color="#ff3355";
  }
}

function showTab(name){
  ["wallets","signal","history"].forEach(t=>{
    document.getElementById("tab-"+t+"-content").style.display=t===name?"block":"none";
    const btn=document.getElementById("tab-"+t);
    btn.style.background=t===name?"#f0c04015":"transparent";
    btn.style.color=t===name?"#f0c040":"#3a3a5a";
    btn.style.borderBottom=t===name?"2px solid #f0c040":"2px solid transparent";
  });
}

async function loadWallets(){
 const list=document.getElementById("walletList");
 list.innerHTML="<div style='padding:30px;text-align:center;font-size:10px;color:#3a3a5a' class='blink'>SCANNING LIVE POLYMARKET DATA...</div>";
 let wallets=[];
 try{
  const r=await fetch(`${SERVER}/leaderboard`);
  const d=await r.json();
  if(d.ok&&d.wallets&&d.wallets.length>0){
   wallets=d.wallets.map(w=>({
    addr:w.address.slice(0,10)+"..."+w.address.slice(-4),
    fullAddr:w.address,
    winRate:w.win_rate,
    wins:w.wins,
    total:w.total,
    volume:0,
    pnl:0,
    streak:0,
    tags:w.win_rate>=0.95?["ELITE","REAL"]:w.win_rate>=0.90?["SHARP","REAL"]:["REAL"],
    real:true,
    name:w.name||"",
   }));
  }
 }catch(e){}
 if(wallets.length===0){
  wallets=await seedWallets(20);
 }
 document.getElementById("statWallets").textContent=wallets.length;
 window._wallets=wallets;
 renderWallets(wallets);
}
  const list=document.getElementById("walletList");
  list.innerHTML="<div style='padding:30px;text-align:center;font-size:10px;color:#3a3a5a' class='blink'>SCANNING POLYMARKET...</div>";
  const wallets=seedWallets(25);
  document.getElementById("statWallets").textContent=wallets.length;
  window._wallets=wallets;
  list.innerHTML=wallets.map((w,i)=>`
    <div onclick="selectWallet(${i})" style="display:grid;grid-template-columns:24px 1fr 56px 50px;gap:8px;align-items:center;padding:10px 16px;border-bottom:1px solid #1a1a28;cursor:pointer" onmouseenter="this.style.background='#f0c04008'" onmouseleave="this.style.background='transparent'">
      <span style="font-size:11px;color:${i<3?"#f0c040":"#3a3a5a"}">${i<3?["🥇","🥈","🥉"][i]:"#"+(i+1)}</span>
      <div>
        <div style="font-size:11px;color:${w.winRate>=0.95?"#f0c040":w.winRate>=0.92?"#00e5ff":"#c0c0d8"}">${w.addr}</div>
        <div style="font-size:8px;color:#3a3a5a;margin-top:2px">${w.tags.map(t=>"<span style='background:#f0c04015;color:#f0c040;padding:1px 4px;border-radius:2px;margin-right:3px'>"+t+"</span>").join("")}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:13px;font-weight:700;color:#00ff88">${Math.round(w.winRate*100)}%</div>
        <div style="font-size:8px;color:#3a3a5a">WIN</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:11px;color:${w.pnl>=0?"#00ff88":"#ff3355"}">${w.pnl>=0?"+":""}$${(w.pnl/1000).toFixed(1)}k</div>
        <div style="font-size:8px;color:#3a3a5a">PNL</div>
      </div>
    </div>
  `).join("");
}
async function selectWallet(i){
  const w=window._wallets[i];
  selectedWallet=w;
  showTab("signal");
  document.getElementById("signalContent").innerHTML="<div style='text-align:center;padding:30px;font-size:10px;color:#00e5ff' class='blink'>CLAUDE AI ANALYZING...</div>";
  let market=null;
  try{
    const r=await fetch(`${SERVER}/markets?limit=20`);
    const d=await r.json();
    const ms=(d.markets||[]).filter(m=>m.question);
    market=ms[Math.floor(Math.random()*ms.length)];
  }catch(e){}
  if(!market){market={question:"Will Bitcoin exceed $90,000 before May 2026?",outcomePrices:["0.41","0.59"],volume:245000};}
  selectedMarket=market;
  const signal=await getSignal(w,market);
  renderSignal(w,market,signal);
}

async function getSignal(wallet,market){
  const yesPrice=parseFloat(market.outcomePrices?.[0]||0.5);
  const prompt="You are a prediction market analyst. Wallet with "+Math.round(wallet.winRate*100)+"% win rate. Market: "+market.question+" YES price: "+yesPrice+" Should we copy? Respond ONLY raw JSON no markdown: {\"action\":\"BUY_YES or BUY_NO or SKIP\",\"confidence\":0.5-0.99,\"size_pct\":1-20,\"thesis\":\"max 10 words\",\"risk\":\"LOW or MEDIUM or HIGH\",\"urgency\":\"IMMEDIATE or WAIT or MONITOR\"}";
  try{
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:200,messages:[{role:"user",content:prompt}]})});
    const d=await r.json();
    const txt=(d.content?.[0]?.text||"{}").replace(/```json|```/g,"").trim();
    return JSON.parse(txt);
  }catch(e){
    return{action:"BUY_YES",confidence:0.72,size_pct:8,thesis:"Strong wallet momentum detected",risk:"MEDIUM",urgency:"WAIT"};
  }
}

function renderSignal(wallet,market,signal){
  const isBuy=signal.action!=="SKIP";
  const isYes=signal.action==="BUY_YES";
  const color=!isBuy?"#3a3a5a":isYes?"#00ff88":"#ff3355";
  const sizeUsd=Math.min(MAX_SIZE*(signal.size_pct||10)/100+1,MAX_SIZE).toFixed(2);
  document.getElementById("signalContent").innerHTML=`<div class="fade">
    <div style="background:#0f0f18;border:1px solid #1e1e2e;border-radius:10px;padding:14px;margin-bottom:12px">
      <div style="font-size:9px;color:#3a3a5a;letter-spacing:2px;margin-bottom:8px">COPYING WALLET</div>
      <div style="font-size:12px;color:#f0c040">${wallet.addr}</div>
      <div style="font-size:10px;color:#3a3a5a;margin-top:4px">${Math.round(wallet.winRate*100)}% win rate - ${wallet.total} trades</div>
    </div>
    <div style="background:#0f0f18;border:1px solid ${color}40;border-radius:10px;padding:14px;margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span style="font-size:13px;font-weight:700;color:${color}">${signal.action.replace("_"," ")}</span>
        <div style="display:flex;gap:6px">
          <span style="font-size:8px;padding:2px 7px;border-radius:3px;background:${signal.urgency==="IMMEDIATE"?"#ff335525":"#00e5ff20"};color:${signal.urgency==="IMMEDIATE"?"#ff3355":"#00e5ff"}">${signal.urgency}</span>
          <span style="font-size:8px;padding:2px 7px;border-radius:3px;background:${signal.risk==="LOW"?"#00ff8820":signal.risk==="HIGH"?"#ff335520":"#f0c04020"};color:${signal.risk==="LOW"?"#00ff88":signal.risk==="HIGH"?"#ff3355":"#f0c040"}">${signal.risk}</span>
        </div>
      </div>
      <div style="font-size:11px;color:#c0c0d8;line-height:1.5;margin-bottom:10px">${market.question}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px">
        <div style="background:#07070b;border-radius:6px;padding:8px;text-align:center"><div style="font-size:8px;color:#3a3a5a">CONF</div><div style="font-size:16px;font-weight:700;color:#f0c040">${Math.round(signal.confidence*100)}%</div></div>
        <div style="background:#07070b;border-radius:6px;padding:8px;text-align:center"><div style="font-size:8px;color:#3a3a5a">SIZE</div><div style="font-size:16px;font-weight:700;color:#00e5ff">$${sizeUsd}</div></div>
        <div style="background:#07070b;border-radius:6px;padding:8px;text-align:center"><div style="font-size:8px;color:#3a3a5a">WR</div><div style="font-size:16px;font-weight:700;color:#00ff88">${Math.round(wallet.winRate*100)}%</div></div>
      </div>
      <div style="background:#07070b;border-radius:6px;padding:8px 12px;font-size:10px;color:#c0c0d8;border-left:3px solid ${color}">${signal.thesis}</div>
    </div>
    ${isBuy?`<button onclick="executeTrade('${signal.action}',${signal.confidence},${sizeUsd})" style="width:100%;padding:14px;background:linear-gradient(135deg,${color},${color}cc);color:#07070b;font-size:12px;font-weight:700;letter-spacing:2px;margin-bottom:8px">EXECUTE COPY TRADE</button><button onclick="selectWallet(window._wallets.indexOf(selectedWallet))" style="width:100%;padding:10px;background:#1a1a28;color:#3a3a5a;font-size:10px;letter-spacing:1px">RE-ANALYZE</button>`:`<div style="text-align:center;padding:16px;font-size:11px;color:#3a3a5a">SKIP - not worth copying</div><button onclick="loadWallets();showTab('wallets')" style="width:100%;padding:10px;background:#1a1a28;color:#3a3a5a;font-size:10px">BACK TO WALLETS</button>`}
  </div>`;
}

async function executeTrade(action,confidence,sizeUsd){
  const btn=event.target;
  btn.textContent="SENDING...";
  btn.disabled=true;
  const yesPrice=parseFloat(selectedMarket.outcomePrices?.[0]||0.5);
  const price=action==="BUY_YES"?yesPrice:1-yesPrice;
  try{
    const r=await fetch(`${SERVER}/execute`,{method:"POST",headers:{"Content-Type":"application/json","x-secret":SECRET},body:JSON.stringify({action,confidence,market_id:selectedMarket.condition_id||selectedMarket.id||"unknown",question:selectedMarket.question,size_usd:parseFloat(sizeUsd),price:Math.max(0.01,Math.min(0.99,price)),wallet:selectedWallet.addr,win_rate:selectedWallet.winRate})});
    const d=await r.json();
    if(d.ok){
      btn.textContent="TRADE SENT!";
      btn.style.background="#00ff8890";
      allTrades.unshift(d.trade);
      document.getElementById("statTrades").textContent=allTrades.length;
      renderHistory();
      setTimeout(()=>{showTab("history");},1500);
    }else{throw new Error(d.detail||"Error");}
  }catch(e){
    btn.textContent="FAILED - "+e.message;
    btn.style.background="#ff335560";
    setTimeout(()=>{btn.textContent="EXECUTE COPY TRADE";btn.style.background="";btn.disabled=false;},3000);
  }
}

async function loadHistory(){
  try{
    const r=await fetch(`${SERVER}/trades`,{headers:{"x-secret":SECRET}});
    const d=await r.json();
    if(d.trades){
      allTrades=d.trades.slice().reverse();
      document.getElementById("statTrades").textContent=allTrades.length;
      const conf=allTrades.length?allTrades.reduce((s,t)=>s+t.confidence,0)/allTrades.length:0;
      document.getElementById("statConf").textContent=allTrades.length?Math.round(conf*100)+"%":"-";
      renderHistory();
    }
  }catch(e){}
}

function renderHistory(){
  const list=document.getElementById("historyList");
  if(!allTrades.length){list.innerHTML="<div style='padding:60px;text-align:center;font-size:11px;color:#3a3a5a;line-height:2'>No trades yet.<br>Analyze a wallet and execute a trade.</div>";return;}
  list.innerHTML=allTrades.map(t=>{
    const isYes=t.action==="BUY_YES";
    const color=isYes?"#00ff88":"#ff3355";
    const time=t.ts?new Date(t.ts).toLocaleTimeString():"";
    return`<div style="padding:12px 16px;border-bottom:1px solid #1a1a28;display:grid;grid-template-columns:48px 1fr 48px;gap:8px;align-items:center">
      <span style="font-size:11px;font-weight:700;color:${color}">${isYes?"UP":"DOWN"}</span>
      <div>
        <div style="font-size:10px;color:#c0c0d8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.question||"Unknown"}</div>
        <div style="font-size:8px;color:#3a3a5a;margin-top:2px">$${parseFloat(t.size_usd||0).toFixed(2)} - ${Math.round((t.confidence||0)*100)}% conf - ${time}</div>
      </div>
      <span style="font-size:8px;padding:2px 6px;border-radius:3px;text-align:center;background:${t.dry_run?"#f0c04015":"#00ff8815"};color:${t.dry_run?"#f0c040":"#00ff88"}">${t.dry_run?"SIM":"LIVE"}</span>
    </div>`;
  }).join("");
}
</script>
</body>
</html>
