<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Polymarket CopyTrade</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07070b;color:#d0d0e8;font-family:'JetBrains Mono',monospace;min-height:100vh}
button{cursor:pointer;font-family:'JetBrains Mono',monospace;border:none;border-radius:6px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes glow{0%,100%{box-shadow:0 0 8px #f0c04040}50%{box-shadow:0 0 20px #f0c04090}}
.blink{animation:pulse 1s infinite}
.fade{animation:fadeIn 0.3s ease}
</style>
</head>
<body>
<div id="main">
  <div style="background:#0a0a10;border-bottom:1px solid #1a1a28;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100">
    <div style="display:flex;align-items:center;gap:10px">
      <div style="width:28px;height:28px;border-radius:7px;background:linear-gradient(135deg,#f0c040,#ffab00);display:flex;align-items:center;justify-content:center;font-size:14px;animation:glow 2s infinite">⚡</div>
      <div>
        <div style="font-size:12px;font-weight:700;color:#f0c040">COPYTRADE BOT</div>
        <div style="font-size:8px;color:#3a3a5a" id="statusLine">CONNECTING...</div>
      </div>
    </div>
    <span id="modeBadge" style="font-size:8px;padding:3px 8px;border-radius:4px;background:#f0c04020;color:#f0c040;letter-spacing:1px">DRY RUN</span>
  </div>
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:#1a1a28;border-bottom:1px solid #1a1a28">
    <div style="background:#0a0a10;padding:12px;text-align:center">
      <div style="font-size:8px;color:#3a3a5a;letter-spacing:1.5px">TRADES</div>
      <div style="font-size:20px;font-weight:700;color:#f0c040" id="statTrades">0</div>
    </div>
    <div style="background:#0a0a10;padding:12px;text-align:center">
      <div style="font-size:8px;color:#3a3a5a;letter-spacing:1.5px">AVG CONF</div>
      <div style="font-size:20px;font-weight:700;color:#00e5ff" id="statConf">-</div>
    </div>
    <div style="background:#0a0a10;padding:12px;text-align:center">
      <div style="font-size:8px;color:#3a3a5a;letter-spacing:1.5px">WALLETS</div>
      <div style="font-size:20px;font-weight:700;color:#00ff88" id="statWallets">0</div>
    </div>
  </div>
  <div style="display:flex;background:#0a0a10;border-bottom:1px solid #1a1a28">
    <button onclick="showTab('wallets')" id="tab-wallets" style="flex:1;padding:11px;background:#f0c04015;color:#f0c040;border-bottom:2px solid #f0c040;font-size:10px;letter-spacing:1px;border-radius:0">WALLETS</button>
    <button onclick="showTab('signal')" id="tab-signal" style="flex:1;padding:11px;background:transparent;color:#3a3a5a;border-bottom:2px solid transparent;font-size:10px;letter-spacing:1px;border-radius:0">SIGNAL</button>
    <button onclick="showTab('history')" id="tab-history" style="flex:1;padding:11px;background:transparent;color:#3a3a5a;border-bottom:2px solid transparent;font-size:10px;letter-spacing:1px;border-radius:0">HISTORY</button>
  </div>
  <div id="tab-wallets-content">
    <div style="padding:12px 16px;display:flex;justify-content:space-between;align-items:center">
      <div style="font-size:9px;color:#3a3a5a;letter-spacing:2px">TOP WALLETS - TAP TO ANALYZE</div>
      <button onclick="loadWallets()" style="background:#f0c04020;color:#f0c040;border:1px solid #f0c04040;font-size:9px;padding:5px 12px;letter-spacing:1px">SCAN</button>
    </div>
    <div id="walletList"></div>
  </div>
  <div id="tab-signal-content" style="display:none;padding:16px">
    <div id="signalContent"><div style="text-align:center;padding:60px 20px;color:#3a3a5a;font-size:11px;line-height:2">Select a wallet from the Wallets tab to generate an AI trade signal</div></div>
  </div>
  <div id="tab-history-content" style="display:none">
    <div style="padding:12px 16px;font-size:9px;color:#3a3a5a;letter-spacing:2px">EXECUTED TRADES</div>
    <div id="historyList"></div>
  </div>
</div>
<script>
const SERVER="https://polymarket-bot-production-0f9f.up.railway.app";
const SECRET="polybot123";
let selectedWallet=null;
let selectedMarket=null;
let allTrades=[];
let MAX_SIZE=5;
function showTab(name){
 ["wallets","signal","history"].forEach(t=>{
  document.getElementById("tab-"+t+"-content").style.display=t===name?"block":"none";
  const btn=document.getElementById("tab-"+t);
  btn.style.background=t===name?"#f0c04015":"transparent";
  btn.style.color=t===name?"#f0c040":"#3a3a5a";
  btn.style.borderBottom=t===name?"2px solid #f0c040":"2px solid transparent";
 });
}
async function init(){
 try{
  const r=await fetch(`${SERVER}/status`,{headers:{"x-secret":SECRET}});
  const d=await r.json();
  document.getElementById("statusLine").textContent=d.has_creds?"CREDENTIALS LOADED":"NO CREDENTIALS";
  if(!d.dry_run){
   const b=document.getElementById("modeBadge");
   b.textContent="LIVE";
   b.style.background="#ff335520";
   b.style.color="#ff3355";
  }
 }catch(e){
  document.getElementById("statusLine").textContent="CONNECTION ERROR";
 }
 loadWallets();
 loadHistory();
 setInterval(loadHistory,15000);
}
async function loadWallets(){
 const list=document.getElementById("walletList");
 list.innerHTML="<div style='padding:30px;text-align:center;font-size:10px;color:#3a3a5a' class='blink'>SCANNING LIVE POLYMARKET DATA...</div>";
 let wallets=[];
 try{
  const r=await fetch(`${SERVER}/leaderboard`);
  const d=await r.json();
  if(d.ok&&d.wallets&&d.wallets.length>0){
   wallets=d.wallets.map(w=>({addr:w.address.slice(0,10)+"..."+w.address.slice(-4),fullAddr:w.address,winRate:w.win_rate,wins:w.wins,total:w.total,pnl:0,tags:w.win_rate>=0.95?["ELITE","REAL"]:w.win_rate>=0.90?["SHARP","REAL"]:["REAL"],real:true,name:w.name||""}));
  }
 }catch(e){}
 if(wallets.length===0){
  wallets=seedWallets(20);
 }
 document.getElementById("statWallets").textContent=wallets.length;
 window._wallets=wallets;
 renderWallets(wallets);
}
function seedWallets(count){
 const addrs=["0x4f2a","0x8c91","0x1d3e","0x7b44","0x2f9a","0x5e1c","0x9d3f","0xae72","0x3c85","0x6f1d","0xb203","0x0e94","0x7a5b","0xc341","0x4891","0x2d7f","0x9c2e","0x5f83","0x1b6a","0x8e05"];
 return addrs.slice(0,count).map((a,i)=>{
  const wr=0.88+Math.random()*0.10;
  const total=40+Math.floor(Math.random()*180);
  return{addr:a+"...f"+((i+1).toString(16).padStart(3,"0")),winRate:wr,wins:Math.floor(total*wr),total,pnl:(5000+Math.random()*90000)*(wr-0.5)*0.4,tags:wr>0.95?["ELITE"]:wr>0.92?["SHARP"]:["CONSISTENT"],real:false};
 }).sort((a,b)=>b.winRate-a.winRate);
}
function renderWallets(wallets){
 const list=document.getElementById("walletList");
 list.innerHTML=wallets.map((w,i)=>`
  <div onclick="selectWallet(${i})" style="display:grid;grid-template-columns:24px 1fr 56px 50px;gap:8px;align-items:center;padding:10px 16px;border-bottom:1px solid #1a1a28;cursor:pointer" onmouseenter="this.style.background='#f0c04008'" onmouseleave="this.style.background='transparent'">
   <span style="font-size:11px;color:${i<3?"#f0c040":"#3a3a5a"}">${i<3?["🥇","🥈","🥉"][i]:"#"+(i+1)}</span>
   <div>
    <div style="font-size:11px;color:${w.winRate>=0.95?"#f0c040":w.winRate>=0.92?"#00e5ff":"#c0c0d8"}">${w.addr}</div>
    <div style="font-size:8px;color:#3a3a5a;margin-top:2px">${(w.tags||[]).map(t=>"<span style='background:#f0c04015;color:#f0c040;padding:1px 4px;border-radius:2px;margin-right:3px'>"+t+"</span>").join("")}</div>
   </div>
   <div style="text-align:right">
    <div style="font-size:13px;font-weight:700;color:#00ff88">${Math.round(w.winRate*100)}%</div>
    <div style="font-size:8px;color:#3a3a5a">WIN</div>
   </div>
   <div style="text-align:right">
    <div style="font-size:11px;color:#00ff88">${w.total||0}</div>
    <div style="font-size:8px;color:#3a3a5a">TRADES</div>
   </div>
  </div>
 `).join("");
}
</script>
